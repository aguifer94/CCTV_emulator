<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulador de Lentes de CCTV</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        .video-container {
            position: relative;
            width: 100%;
            flex: 1;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            position: absolute;
            height: 100%;
            width: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .controls {
            width: 100%;
            background: rgba(30, 30, 30, 0.95);
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.6);
            z-index: 10;
            padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px)); 
        }

        .lens-buttons {
            display: flex;
            justify-content: space-between;
            width: 100%;
            gap: 8px;
        }

        button {
            flex: 1;
            background: #333;
            color: #fff;
            border: 2px solid #555;
            padding: 12px 5px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        button.active {
            background: #007bff;
            border-color: #00c6ff;
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.5);
        }

        .switch-btn {
            width: 100%;
            background: #28a745;
            border-color: #1e7e34;
            padding: 10px;
            font-size: 13px;
        }

        .info-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.75);
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 13px;
            pointer-events: none;
            z-index: 10;
            border-left: 4px solid #007bff;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <div class="info-overlay" id="info">Lente: 2.8mm (FOV: ~104°)<br><small style="color: #bbb;">Forzando inicialización en Ultra Wide (0.5x)</small></div>
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <div class="controls">
        <div class="lens-buttons">
            <button class="active" onclick="changeLens(2.8, 1.0, '104°', event)">2.8 mm</button>
            <button onclick="changeLens(3.6, 1.22, '85°', event)">3.6 mm</button>
            <button onclick="changeLens(6.0, 1.92, '54°', event)">6.0 mm</button>
            <button onclick="changeLens(12.0, 4.33, '24°', event)">12 mm</button>
        </div>
        <button class="switch-btn" onclick="switchCamera()">🔄 Cambiar Cámara Trasera</button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const info = document.getElementById('info');
        const buttons = document.querySelectorAll('.lens-buttons button');
        
        let videoDevices = [];
        let currentDeviceIndex = 0;
        let currentStream = null;

        async function getCameras() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                
                // 1. FILTRADO: Limpiar la lista para quedarse únicamente con sensores traseros
                videoDevices = devices.filter(device => 
                    device.kind === 'videoinput' && 
                    !device.label.toLowerCase().includes('front') && 
                    !device.label.toLowerCase().includes('frontal') && 
                    !device.label.toLowerCase().includes('user') &&
                    !device.label.toLowerCase().includes('selfie')
                );

                // 2. PRIORIZACIÓN: Buscar si alguna cámara trasera se etiqueta como ultra-wide
                let ultraWideIndex = videoDevices.findIndex(d => 
                    d.label.toLowerCase().includes('ultra') || 
                    d.label.toLowerCase().includes('0.5') ||
                    d.label.toLowerCase().includes('wide')
                );
                
                if (ultraWideIndex !== -1) {
                    currentDeviceIndex = ultraWideIndex;
                } else {
                    // Si el sistema no da nombres claros, empezamos desde la última trasera detectada
                    currentDeviceIndex = videoDevices.length > 0 ? videoDevices.length - 1 : 0;
                }
                
                initCamera();
            } catch (err) {
                alert("Error al listar cámaras: " + err.message);
            }
        }

        async function initCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            if (videoDevices.length === 0) {
                // Fallback de emergencia si el filtrado estricto de etiquetas falló
                try {
                    currentStream = await navigator.mediaDevices.getUserMedia({
                        video: { 
                            facingMode: { ideal: "environment" },
                            advanced: [{ zoom: 0.5 }] // Tu truco aplicable de forma genérica
                        }
                    });
                    video.srcObject = currentStream;
                } catch (e) {
                    alert("No se detectaron cámaras de entorno válidas.");
                }
                return;
            }

            // 3. CONSTRANITS CON ZOOM MENOR A 1 (0.5x)
            const constraints = {
                video: {
                    deviceId: { exact: videoDevices[currentDeviceIndex].deviceId },
                    width: { ideal: 1920 },
                    height: { ideal: 1080 },
                    // 'advanced' no rompe la ejecución si el hardware específico no soporta el zoom < 1
                    advanced: [{ zoom: 0.5 }] 
                },
                audio: false
            };

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
            } catch (err) {
                // Si la restricción del zoom falla de forma estricta en un ID dado, reintenta limpio
                try {
                    currentStream = await navigator.mediaDevices.getUserMedia({
                        video: { 
                            deviceId: { exact: videoDevices[currentDeviceIndex].deviceId },
                            width: { ideal: 1920 },
                            height: { ideal: 1080 }
                        }
                    });
                    video.srcObject = currentStream;
                } catch (e) {
                    alert("Error al encender el lente seleccionado: " + e.message);
                }
            }
        }

        function switchCamera() {
            if (videoDevices.length <= 1) {
                alert("No se detectaron más cámaras traseras independientes.");
                return;
            }
            currentDeviceIndex = (currentDeviceIndex + 1) % videoDevices.length;
            initCamera();
        }

        function changeLens(lensSize, zoomFactor, fov, event) {
            video.style.transform = `scale(${zoomFactor})`;
            info.innerHTML = `Lente: ${lensSize}mm (FOV: ~${fov})<br><small style="color: #bbb;">Simulación basada en rango ultra gran angular</small>`;
            buttons.forEach(btn => btn.classList.remove('active'));
            if (event && event.target) {
                event.target.classList.add('active');
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    stream.getTracks().forEach(track => track.stop());
                    getCameras();
                })
                .catch(err => alert("Se necesitan permisos de cámara: " + err.message));
        });
    </script>
</body>
</html>
